<!-- Header Banner -->
<app-header></app-header>

<div class="container">
  <div class="row">
    <!-- Columna Izquierda: Carga e Imagen (Uploader) -->
    <div class="col-lg-7 mb-4">
      <app-image-uploader 
        [loading]="loading" 
        [error]="error"
        (predict)="onPredict($event)" 
        (cleared)="onCleared()">
      </app-image-uploader>
    </div>

    <!-- Columna Derecha: Resultados, Historial y Estadísticas -->
    <div class="col-lg-5 mb-4">
      <!-- Tarjeta de Resultados -->
      <app-prediction-result 
        [result]="result" 
        [sourceInfo]="sourceInfo"
        (feedback)="onFeedback($event)">
      </app-prediction-result>

      <!-- Panel de Estadísticas e Historial de Sesión -->
      <app-session-stats 
        [stats]="historicalStats" 
        [history]="history">
      </app-session-stats>
    </div>
  </div>
</div>

<!-- Footer -->
<footer class="bg-light text-center py-3 mt-5 border-top text-muted small">
  <div class="container">
    <p class="mb-0">&copy; 2026 Detector de Manos IA. Todos los derechos reservados.</p>
  </div>
</footer>
