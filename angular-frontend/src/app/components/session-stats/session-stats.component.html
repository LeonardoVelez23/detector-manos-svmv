<!-- Tarjeta de Estadísticas de Sesión -->
<div class="card border-0 shadow-sm mb-4">
  <div class="card-header bg-transparent border-0 pt-4 px-4 pb-0">
    <h2 class="card-title h5 fw-bold text-secondary">Estadísticas de Sesión</h2>
  </div>
  <div class="card-body p-4 pt-2">
    <div class="row text-center g-3">
      <div class="col-6">
        <div class="p-3 bg-light rounded-3 shadow-inner" style="background: linear-gradient(180deg, #1f2937 0%, #111827 100%); border: 1px solid #374151 !important;">
          <span class="d-block text-uppercase fw-bold text-muted mb-1" style="font-size: 0.75rem; letter-spacing: 0.05em;">Procesadas</span>
          <span class="d-block fw-black text-success" style="font-size: 2.25rem; line-height: 1; font-weight: 900;">{{ processedCount }}</span>
        </div>
      </div>
      <div class="col-6">
        <div class="p-3 bg-light rounded-3 shadow-inner" style="background: linear-gradient(180deg, #1f2937 0%, #111827 100%); border: 1px solid #374151 !important;">
          <span class="d-block text-uppercase fw-bold text-muted mb-1" style="font-size: 0.75rem; letter-spacing: 0.05em;">Última Confianza</span>
          <span class="d-block fw-black text-success" style="font-size: 2.25rem; line-height: 1; font-weight: 900;">{{ lastConfidence }}</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Tarjeta de Historial -->
<div *ngIf="history.length > 0" class="card border-0 shadow-sm animate-fade-up">
  <div class="card-header bg-transparent border-0 pt-4 px-4 pb-0">
    <h2 class="card-title h5 fw-bold text-secondary">Historial Reciente</h2>
  </div>
  <div class="card-body p-4 pt-2">
    <div class="list-group list-group-flush rounded shadow-sm border overflow-auto" style="max-height: 250px;">
      <div 
        *ngFor="let item of history" 
        class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-2 px-3 animate-fade-up border-bottom">
        
        <div class="d-flex flex-column gap-1">
          <!-- Pill dinámico basado en la clasificación -->
          <div>
            <span *ngIf="item.classification === 'Abierta'" class="badge rounded-pill fw-bold text-success" 
              style="background-color: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); font-size: 0.75rem;">
              🖐️ Abierta
            </span>
            <span *ngIf="item.classification === 'Cerrada'" class="badge rounded-pill fw-bold text-primary" 
              style="background-color: rgba(79, 70, 229, 0.1); border: 1px solid rgba(79, 70, 229, 0.2); font-size: 0.75rem;">
              ✊ Cerrada
            </span>
            <span *ngIf="item.classification === 'No seguro'" class="badge rounded-pill fw-bold text-warning" 
              style="background-color: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.2); font-size: 0.75rem;">
              ⚠️ Indeterminado
            </span>
          </div>
          <span class="text-muted" style="font-size: 0.72rem;">
            ⏱️ {{ item.time }} • 📄 {{ item.source | slice:0:15 }}{{ item.source.length > 15 ? '...' : '' }}
          </span>
        </div>

        <span class="badge fw-bold text-success shadow-sm" 
          style="font-size: 0.8rem; background-color: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); font-family: var(--font-family-heading);">
          {{ item.confidence }}%
        </span>
      </div>
    </div>
  </div>
</div>
