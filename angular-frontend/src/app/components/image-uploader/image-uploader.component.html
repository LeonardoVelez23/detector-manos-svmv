<div class="card border-0 shadow-sm mb-4">
  <div class="card-header bg-transparent border-0 pt-4 px-4 pb-0">
    <h2 class="card-title h5 fw-bold text-secondary mb-3">Cargar Imagen</h2>
    
    <!-- Pestañas de Carga -->
    <ul class="nav nav-pills nav-fill bg-light p-1 rounded">
      <li class="nav-item">
        <button 
          class="nav-link fw-semibold" 
          [class.active]="activeTab === 'file'"
          (click)="selectTab('file')">
          📁 Archivo Local
        </button>
      </li>
      <li class="nav-item">
        <button 
          class="nav-link fw-semibold" 
          [class.active]="activeTab === 'url'"
          (click)="selectTab('url')">
          🔗 Desde URL
        </button>
      </li>
      <li class="nav-item">
        <button 
          class="nav-link fw-semibold" 
          [class.active]="activeTab === 'webcam'"
          (click)="selectTab('webcam')">
          📷 Cámara Web
        </button>
      </li>
    </ul>
  </div>

  <div class="card-body p-4">
    <!-- Área Archivo Local (Drag & Drop) -->
    <div *ngIf="activeTab === 'file'">
      <div 
        class="drag-drop-zone p-5 text-center rounded border border-2 border-dashed"
        [class.dragover]="isDragOver"
        (dragover)="onDragOver($event)"
        (dragleave)="onDragLeave()"
        (drop)="onDrop($event)"
        (click)="fileInput.click()">
        <div class="fs-1 mb-2">📥</div>
        <p class="mb-1 fw-medium text-dark">Arrastra una imagen aquí</p>
        <p class="text-muted small mb-3">o haz clic para seleccionar desde tu dispositivo</p>
        <button class="btn btn-sm btn-outline-success px-4 fw-semibold">Buscar Archivo</button>
        <input 
          type="file" 
          #fileInput 
          class="d-none" 
          accept="image/*" 
          (change)="onFileSelected($event)" />
      </div>
      <div class="text-center mt-2 text-muted small">Formatos soportados: JPG, PNG, WEBP, BMP (Máx 5MB)</div>
    </div>

    <!-- Área URL -->
    <div *ngIf="activeTab === 'url'">
      <div class="p-4 bg-light rounded text-center border">
        <div class="fs-1 mb-2">🔗</div>
        <p class="fw-medium mb-3">Ingresa la URL directa de la imagen</p>
        <div class="input-group">
          <input 
            type="url" 
            class="form-control" 
            placeholder="https://ejemplo.com/imagen.jpg" 
            [(ngModel)]="imageUrl"
            (keyup.enter)="onUrlLoaded()" />
          <button class="btn btn-success fw-semibold px-4" (click)="onUrlLoaded()">Cargar</button>
        </div>
      </div>
    </div>

    <!-- Área Cámara Web -->
    <div *ngIf="activeTab === 'webcam'">
      <div class="p-3 bg-light rounded text-center border">
        <div *ngIf="webcamActive" class="ratio ratio-4x3 bg-dark rounded mb-3 overflow-hidden shadow-sm">
          <video #videoElement autoplay playsinline muted></video>
        </div>
        <div *ngIf="!webcamActive" class="py-5 text-muted">
          <div class="fs-1 mb-2">📷</div>
          <p class="mb-3">La cámara web está inactiva</p>
          <button class="btn btn-success fw-semibold px-4" (click)="startWebcam()">Iniciar Cámara</button>
        </div>
        <div *ngIf="webcamActive" class="d-flex gap-2 justify-content-center">
          <button class="btn btn-danger fw-semibold px-4" (click)="stopWebcam()">Detener</button>
          <button class="btn btn-success fw-semibold px-4" (click)="captureFrame()">📸 Capturar Foto</button>
        </div>
      </div>
    </div>

    <!-- Alerta de Errores -->
    <div *ngIf="error" class="alert alert-danger d-flex align-items-center mt-4 border-0 shadow-sm" role="alert">
      <span class="fs-5 me-2">⚠️</span>
      <div class="small fw-semibold">{{ error }}</div>
    </div>
  </div>
</div>

<!-- Sección de Vista Previa -->
<div *ngIf="previewUrl" class="card border-0 shadow-sm mb-4">
  <div class="card-header bg-transparent border-0 pt-4 px-4 pb-0">
    <h2 class="card-title h5 fw-bold text-secondary">Vista Previa de la Imagen</h2>
  </div>
  <div class="card-body p-4 text-center">
    <div class="preview-img-container p-2 bg-light rounded mb-3 shadow-inner d-inline-block border">
      <img [src]="previewUrl" alt="Vista Previa" class="img-fluid rounded" style="max-height: 350px;" />
    </div>
    <div class="d-flex gap-3 justify-content-center">
      <button class="btn btn-secondary px-4 fw-semibold" (click)="clearSelections()">Limpiar</button>
      <button class="btn btn-success px-5 fw-bold" [disabled]="loading" (click)="triggerPredict()">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
        {{ loading ? 'Procesando...' : 'Realizar Predicción' }}
      </button>
    </div>
  </div>
</div>
